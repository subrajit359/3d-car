kind = "mobile"
previewPath = "/"
title = "3D Car Game"
version = "1.0.0"
id = "artifacts/car"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 26234

[services.development]
run = "pnpm --filter @workspace/car run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/car", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/car", "run", "serve" ]

[services.env]
PORT = "26234"
BASE_PATH = "/"
